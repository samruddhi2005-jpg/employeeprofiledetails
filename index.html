<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <title>EmployeeProfileTable</title>
    <link rel="stylesheet" href="EmployeeProfileTable.css">
    <script src="EmployeeProfileTable.js" defer></script>
</head>
<body>
    <table id="employee_profile_table">
        <caption id="employee_profile_table_caption">EmployeeProfile</caption>
        <thead id="employee_profile_table_head">
            <tr class="employee_profile_table_head_rows">
                <th class="employee_profile_table_head_cells">EmployeeKey</th>
                <th class="employee_profile_table_head_cells">EmployeeValue</th>
            </tr>
        </thead>
        <tbody id="employee_profile_table_body">
            <tr class="employee_profile_table_body_rows lightgray_rows">
                <td class="employee_profile_table_body_cells employee_profile_table_key_cells">Name</td>
                <td class="employee_profile_table_body_cells" id="name_cell"></td>
            </tr>
            <tr class="employee_profile_table_body_rows darkgray_rows">
                <td class="employee_profile_table_body_cells employee_profile_table_key_cells">Salary</td>
                <td class="employee_profile_table_body_cells" id="salary_cell"></td>
            </tr>
            <tr class="employee_profile_table_body_rows lightgray_rows">
                <td class="employee_profile_table_body_cells employee_profile_table_key_cells">Designation</td>
                <td class="employee_profile_table_body_cells" id="designation_cell"></td>
            </tr>
            <tr class="employee_profile_table_body_rows darkgray_rows">
                <td class="employee_profile_table_body_cells employee_profile_table_key_cells">JobLocation</td>
                <td class="employee_profile_table_body_cells" id="job_location_cell"></td>
            </tr>
            <tr class="employee_profile_table_body_rows lightgray_rows">
                <td class="employee_profile_table_body_cells employee_profile_table_key_cells">YearsOfExperience</td>
                <td class="employee_profile_table_body_cells" id="years_of_experience_cell"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
